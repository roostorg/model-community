# ==============================================================================
# CRITICAL FIELDS FOR TRUST & SAFETY AGENTS
# ==============================================================================

safety_critical_fields:
  identity_verification:
    - User.verified (email verification)
    - User.mfa_enabled (account security)
    - User.bot (flag; bot vs human)
    - User.system (flag; system user)
    - GuildMember.pending (incomplete onboarding; risky member)

  moderation_actions:
    - GuildMember.communication_disabled_until (timeout/mute end)
    - GuildBan (ban records)
    - Role.managed (bot-managed; trustworthiness)
    - AutoModerationRule.enabled (enforcement status)
    - AuditLogEntry.action_type (what action; enum critical)
    - AuditLogEntry.user_id (who performed; audit chain)
    - AuditLogEntry.reason (intent)

  content_control:
    - Guild.verification_level (join friction)
    - Guild.explicit_content_filter (filter strictness)
    - Guild.nsfw_level (adult content flag)
    - Channel.nsfw (channel age gate)
    - Message.type (system vs user; automation)
    - Message.flags (EPHEMERAL, LOADING, etc.)
    - Message.mention_everyone (spam indicator)

  social_graph:
    - GuildMember.roles (permission/status)
    - GuildMember.joined_at (tenure; infiltration detection)
    - Relationship.type (friend/blocked)
    - Invite.uses, max_uses, max_age (invite spam)
    - Invite.target_user (invite targeting)

  real_time:
    - VoiceState.channel_id (voice activity; evasion detection)
    - VoiceState.self_stream (streaming to guild; broadcast)
    - Presence.status (online/idle/dnd; activity)
    - MESSAGE_CREATE event (content stream; real-time moderation)
    - AUTO_MODERATION_ACTION_EXECUTION (enforcement visibility)

  commerce:
    - Entitlement.type (user vs guild subscription)
    - Entitlement.deleted (revocation/chargeback)
    - SKU.flags (restrictions)

  compliance:
    - Guild.features (includes COMMUNITY; affects moderation baseline)
    - Guild.verification_level (baseline safety requirement)
    - AuditLogEntry (complete audit trail)
    - ApplicationCommand.nsfw (age-gating)

---
# Notes for T&S Implementation:
# 1. MESSAGE_CONTENT intent is PRIVILEGED; requires explicit approval.
# 2. Audit logs do not capture individual MESSAGE events directly; use MESSAGE_CREATE gateway event for real-time moderation.
# 3. Auto Moderation rules execute client-side (user sees error); alert messages log to a channel; timeout/quarantine are async actions.
# 4. Entitlements are the source of truth for perks, not subscription events.
# 5. Roles with bot_id indicate bot-managed; integration_id indicates third-party service-managed.
# 6. GuildMember.pending blocks message sending until onboarding complete (first layer of T&S friction).
# 7. Webhooks (especially followers) enable cross-guild amplification; track webhook creation in audit logs.
# 8. Components (buttons, selects) can be stateful via custom_id; monitor for phishing/click-jacking.
